{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>HMS Admin Login</title>

    <link rel="stylesheet" href="{% static 'css/admin_login.css' %}">

    <!-- FONT AWESOME -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

</head>

<body>

    <div class="admin-login-container">

        <div class="admin-login-card">

            <div class="admin-header">


                <h1>Admin Login</h1>

                <p>
                    Secure access to the hostel management dashboard
                </p>

            </div>

            {% if error %}
            <div class="admin-error">

                <i class="fa-solid fa-circle-exclamation"></i>

                <span>{{ error }}</span>

            </div>
            {% endif %}

            <form method="POST" autocomplete="off" class="admin-login-form">

                {% csrf_token %}

                <div class="input-group">

                    <label>Email Address</label>

                    <div class="input-field">

                        <i class="fa-regular fa-envelope"></i>

                        <input type="email" name="email" autocomplete="off" placeholder="Enter admin email" required>
                    </div>

                </div>

                <div class="input-group">

                    <label>Password</label>

                    <div class="input-field password-wrapper">

                        <button type="button" id="togglePassword" class="toggle-password">

                            <i class="fa-solid fa-eye-slash"></i>

                        </button>

                        <input type="password" name="password" autocomplete="new-password" id="adminPassword"
                            placeholder="Enter password" required>

                    </div>
                </div>

                <button type="submit" class="admin-login-btn">

                    Access Dashboard

                </button>

            </form>

        </div>

    </div>

    <script src="{% static 'js/admin_login.js' %}"></script>

</body>

</html>
