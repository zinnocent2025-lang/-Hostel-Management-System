{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>

    <link rel="stylesheet" href="{% static 'css/contact.css' %}">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>

    <!-- navbar -->
    <header class="navbar">

        <nav>
            <a href="{% url 'home' %}">Home</a>
            <a href="{% url 'login' %}">Student Login</a>
        </nav>
    </header>

    <!-- contact section -->
    <section class="contact-section">
        <div class="contact-container">

            <!-- FORM LOGO -->
            <div class="form-logo">
                <img src="{% static 'images/logo.png'%}" alt="Logo">
            </div>

            <h2>Contact Us</h2>
            <p>If you have any questions or need assistance, please fill the form below</p>

            <form class="contact-form" method="POST">
                {% csrf_token %}

                <div class="form-group input-icon">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" name="name" placeholder="Enter your full name" required>
                </div>

                <div class="form-group input-icon">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" name="email" placeholder="Enter your email" required>
                </div>

                <div class="form-group input-icon">
                    <i class="fa-solid fa-phone"></i>
                    <input type="tel" name="phone" placeholder="Enter your phone number">
                </div>

                <div class="form-group input-icon textarea-icon">
                    <i class="fa-solid fa-message"></i>
                    <textarea name="message" rows="5" placeholder="Write your message here..." required></textarea>
                </div>

                <button type="submit" class="btn-primary">
                    <i class="fa-solid fa-paper-plane"></i> Send Message
                </button>

            </form>
            <div id="planeAnimation" class="plane-animation">
                <i class="fa-solid fa-paper-plane"></i>
            </div>

            <div id="successState" class="success-state">
                <h3>Message Sent Successfully</h3>
                <p>We will get back to you soon</p>
            </div>

        </div>
    </section>

    <script src="{% static 'js/contact.js' %}"></script>

</body>

</html>
