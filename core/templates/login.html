{% load static %}
{% load socialaccount %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login</title>

    <link rel="stylesheet" href="{% static 'css/login.css' %}">

    <!-- GOOGLE FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- FONT AWESOME ICONS (for Google/Facebook/Apple icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>

<body>

    <!-- navbar -->
    <header class="navbar">
        <nav>
            <a href="{% url 'home' %}">Home</a>
            <a href="{% url 'contact' %}">Contact</a>
        </nav>
    </header>

    <!-- login section -->
    <section class="login-section">
        <div class="login-container">

            <!-- LOGO (PUT YOUR LOGO IMAGE HERE) -->
            <img src="{% static 'images/logo.png'%}" class="login-logo" alt="Jobitech Logo">

            <h2>Student Login</h2>
            <p>Please login to access your hostel dashboard</p>

            {% if error %}
            <p style="color:red; text-align:center; margin-bottom:15px;">
                {{ error }}
            </p>
            {% endif %}

            <form method="POST" action="{% url 'login' %}" class="login-form">
                {% csrf_token %}

                <div class="form-group">
                    <label>Email Address</label>
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" name="email" placeholder="Enter your email" required>
                </div>

                <div class="form-group password-box">
                    <label>Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>

                    <div class="remember-wrap">
                        <label class="remember-label">
                            <input type="checkbox" name="remember_me">
                            Remember Me
                        </label>
                    </div>

                    <span class="eye-btn" id="togglePassword">
                        <i class="fa-solid fa-eye"></i>
                    </span>
                </div>

                <button type="submit" class="btn-primary">Login</button>
            </form>

            <!-- DIVIDER -->
            <div class="divider">
                <span>or</span>
            </div>

            <!-- SOCIAL LOGIN BUTTONS -->
            <div class="social-login">
                <a href="{% provider_login_url 'google' %}" class="social-btn google">
                    <i class="fa-brands fa-google"></i>
                    Continue with Google
                </a>
            </div>

            <!-- FOOTER -->
            <div class="login-footer">
                <a href="{% url 'password_reset' %}">Forgot Password?</a>
                <p>New Students? <a href="{% url 'register' %}"></a>Apply Now</a></p>
            </div>

        </div>
    </section>
    <script src="{% static 'js/login.js' %}"></script>
</body>

</html>
