<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    {% load static %}

    <!DOCTYPE html>
    <html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Edit Hostel</title>

        <link rel="stylesheet" href="{% static 'dashboard/css/add-hostel.css' %}">
    </head>

    <body>

        <div class="page-wrapper">

            <div class="card">

                <div class="card-top">
                    <h2>Edit Hostel</h2>
                </div>

                <form method="POST" enctype="multipart/form-data">

                    {% csrf_token %}

                    <div class="form-group">
                        <label>Hostel Name</label>
                        {{ form.name }}
                    </div>

                    <div class="form-group">
                        <label>Location</label>
                        {{ form.location }}
                    </div>

                    <div class="form-group">
                        <label>Price</label>
                        {{ form.price }}
                    </div>
                    <div class="form-group">
                        <label>Hostel Capacity</label>
                        {{ form.capacity }}
                    </div>
                    <div class="form-group">
                        <label>Total Rooms</label>
                        {{ form.total_rooms }}
                    </div>

                    <div class="form-group">
                        <label>Description</label>
                        {{ form.description }}
                    </div>

                    <div class="form-group">
                        <label>Hostel Image</label>
                        {{ form.image }}
                    </div>

                    <div class="btn-area">
                        <a href="/dashboard/" class="cancel-btn">Cancel</a>

                        <button type="submit">
                            Update Hostel
                        </button>
                    </div>

                </form>

            </div>

        </div>

    </body>

    </html>
</body>

</html>
