{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create New Password</title>

<link rel="stylesheet" href="{% static 'css/password-reset.css' %}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<body>

<div class="auth-wrapper">
    <div class="auth-card">

        <div class="logo-circle">
            <i class="fa-solid fa-key"></i>
        </div>

        <h2>Create New Password</h2>
        <p>Enter your new password below</p>

        <form method="POST">
            {% csrf_token %}

            <div class="input-group password-field">
                <i class="fa-solid fa-eye-slash toggle-eye"></i>
                {{ form.new_password1 }}
            </div>

            <div class="input-group password-field">
                <i class="fa-solid fa-eye-slash toggle-eye"></i>
                {{ form.new_password2 }}
            </div>

            <button type="submit">Update Password</button>
        </form>

    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

    const fields = document.querySelectorAll(".password-field");

    fields.forEach((field, index) => {

        const input = field.querySelector("input");
        const eye = field.querySelector(".toggle-eye");

        input.type = "password";
        input.autocomplete = "new-password";
        input.placeholder = index === 0
            ? "New Password"
            : "Confirm Password";

        eye.addEventListener("click", () => {

            if (input.type === "password") {
                input.type = "text";
                eye.classList.remove("fa-eye-slash");
                eye.classList.add("fa-eye");
            } else {
                input.type = "password";
                eye.classList.remove("fa-eye");
                eye.classList.add("fa-eye-slash");
            }

        });

    });

});
</script>

</body>
</html>
